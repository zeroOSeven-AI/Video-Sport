name: Fetch Latest F1 YouTube Playlists

on:
  schedule:
    # Runs every 4 hours (at minute 25 to avoid heavy global traffic on the hour)
    - cron: '25 */4 * * *'
  workflow_dispatch: # Allows you to trigger this manually from the GitHub Actions tab

# Prevents concurrent runs from making conflicting git pushes
concurrency:
  group: youtube-fetch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-youtube-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Automatically caches dependencies for faster subsequent runs

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Create YouTube directory if missing
      run: mkdir -p YouTube

    - name: Run fetch script
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python youtube_sources.py

    - name: Commit and push changes safely
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Stage only JSON files inside the YouTube directory
        git add YouTube/*.json
        
        # Check if there are actual modifications staged
        if git diff --staged --quiet; then
          print("No changes detected in YouTube video feeds. Skipping commit.")
        else
          print("New videos detected! Committing updates...")
          git commit -m "Automated update: Fresh YouTube playlist feeds"
          git push
        fi
