name: Fetch Latest F1 YouTube Playlists

on:
  schedule:
    # Pokreće se svaka 4 sata (na 25. minutu kako bi se izbjeglo zagušenje na puni sat)
    - cron: '25 */4 * * *'
  workflow_dispatch: # Omogućuje ti ručno pokretanje iz GitHub Actions tab-a

# Sprječava istovremeno pokretanje više workflowa koji bi mogli izazvati konflikte kod pushanja
concurrency:
  group: youtube-fetch-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update-youtube-data:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Sada radi savršeno jer si dodao datoteku s ovisnostima!

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create YouTube directory if missing
      run: mkdir -p YouTube

    - name: Run fetch script
      env:
        YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      run: python YouTube/F1/youtube_sources.py

    - name: Commit and push changes safely
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        # Dodaj samo JSON datoteke unutar YouTube mape
        git add YouTube/*.json
        
        # Provjeri ima li stvarnih promjena u JSON datotekama
        if git diff --staged --quiet; then
          echo "No changes detected in YouTube video feeds. Skipping commit."
        else
          echo "New videos detected! Committing updates..."
          git commit -m "Automated update: Fresh YouTube playlist feeds"
          git push
        fi
